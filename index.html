<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Riana | Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<nav class="navbar">
  <div class="nav-logo">Riana</div>

  <div class="nav-right">
    <ul class="nav-menu" id="navMenu">
      <li><a href="#about">About</a></li>
      <li><a href="#works">Works</a></li>
    </ul>

    <button id="darkToggle">🌙</button>
    <button class="hamburger" id="hamburger">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1 class="hero-title">Hai, aku Riana 👋</h1>
  <p class="hero-sub">
    <span id="typing"></span>
  </p>

  <div class="hero-buttons">
    <a href="#about" class="btn-outline">
      <i class="fa-solid fa-user"></i> About Me
    </a>
    <a href="#works" class="btn">
      <i class="fa-solid fa-code"></i> My Works
    </a>
  </div>
</section>

<div class="container">

  <section class="about fade-in" id="about">
    <h2>About Me</h2>
    <p>
      Saya merupakan siswa kelas X RPL yang memiliki minat
      di bidang coding dan desain.
    </p>
  </section>

  <section class="portfolio fade-in" id="works">
    <h2>My Works</h2>

    <div class="portfolio-cards">
      <div class="card fade-in">
        <h3>Design</h3>
        <p>Digital drawing & poster design</p>
      </div>

      <div class="card fade-in">
        <h3>Coding</h3>
        <p>Website sederhana HTML & CSS</p>
      </div>
    </div>
  </section>

</div>

<footer class="footer">
  © 2026 Riana — Built with HTML & CSS
</footer>

<script>
/* DARK MODE */
darkToggle.onclick = () => {
  document.body.classList.toggle("dark");
};

/* SCROLL ANIMATION */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});
document.querySelectorAll(".fade-in").forEach(el => observer.observe(el));

/* TYPING EFFECT */
const text = "Pelajar SMK RPL | Web Development | UI Design";
let i = 0;
function typing() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 60);
  }
}
typing();

/* HAMBURGER */
hamburger.onclick = () => {
  navMenu.classList.toggle("active");
};
</script>

</body>
</html>
